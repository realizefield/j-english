<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆速英文法｜EA10 三単現のs</title>
<style>
:root{
  --primary:#1a56a0;--primary-light:#dbeafe;--primary-mid:#2563eb;
  --accent:#e8372d;--accent-light:#fff1f0;
  --success:#16a34a;--success-light:#dcfce7;
  --warn:#d97706;--warn-light:#fffbeb;
  --orange:#f97316;--orange-light:#fff7ed;
  --bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;
  --text:#1e293b;--text-sub:#64748b;--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:160px;}

/* ヘッダー */
.page-header{background:var(--primary);color:#fff;padding:16px 20px 12px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.8em;opacity:.8;letter-spacing:.1em;margin-bottom:3px;}
.page-header h1{font-size:clamp(1.05em,3vw,1.4em);font-weight:700;margin:0;}

/* ステップナビ */
.step-nav{display:flex;gap:3px;padding:8px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.step-btn{flex:1;padding:8px 2px;border:none;background:#e2e8f0;cursor:pointer;font-weight:700;border-radius:8px;font-size:clamp(.68em,2.2vw,.82em);font-family:'BIZ UDPGothic',sans-serif;color:var(--text-sub);transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,86,160,.3);}
.step-btn.completed{background:var(--success);color:#fff;}

/* メインコンテナ */
.g-container{max-width:760px;margin:0 auto;padding:16px 14px;}

/* タイマーバー */
.timer-bar{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.timer-display{font-size:clamp(1.8em,6vw,2.4em);font-weight:700;font-family:monospace;color:var(--accent);min-width:80px;text-align:center;}
.btn-start{font-family:'BIZ UDPGothic',sans-serif;background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:50px;font-weight:700;font-size:clamp(.95em,2.5vw,1.1em);cursor:pointer;box-shadow:0 3px 10px rgba(232,55,45,.3);transition:.2s;}
.btn-start:hover{transform:translateY(-1px);}

/* 記録 */
.record-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;}
.record-title{font-size:.88em;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:6px;margin-bottom:10px;}
.record-list{list-style:none;padding:0;}
.record-list li{display:flex;justify-content:space-between;padding:6px 4px;font-size:.88em;border-bottom:1px solid var(--border);}
.record-list li:last-child{border-bottom:none;}
.record-time{font-family:monospace;font-weight:700;color:var(--primary);}
.btn-reset{font-family:'BIZ UDPGothic',sans-serif;background:#f1f5f9;color:var(--text-sub);border:none;padding:7px;width:100%;border-radius:8px;cursor:pointer;font-size:.82em;margin-top:8px;}

/* 単語帳 */
.vocab-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;}
.vocab-title{font-size:.88em;font-weight:700;color:var(--success);border-bottom:2px solid var(--success);padding-bottom:6px;margin-bottom:10px;}
.word-list{list-style:none;padding:0;}
.word-list li{background:var(--success-light);margin-bottom:5px;padding:7px 10px;border-radius:7px;font-size:.88em;border-left:4px solid var(--success);}

/* セクション */
.section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.section h2{font-size:1.02em;font-weight:700;color:var(--primary);border-left:4px solid var(--primary);padding-left:10px;margin-bottom:14px;}

/* 表 */
.eng-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.93em;}
.eng-table th{background:var(--primary);color:#fff;padding:10px;text-align:center;border:1px solid var(--border);}
.eng-table td{border:1px solid var(--border);padding:10px;text-align:center;}
.eng-table tr:nth-child(even) td{background:var(--primary-light);}
.eng-table .td-left{text-align:left;padding-left:14px;}

/* 空欄 */
.blank{display:inline-block;min-width:54px;height:28px;border-bottom:2.5px solid var(--success);vertical-align:middle;text-align:center;color:var(--primary-mid);font-weight:700;cursor:pointer;transition:.2s;}
.blank.is-active{background:var(--success-light);border:2px solid var(--success);border-radius:5px;}

/* 単語カード（並べ替え） */
.sentence-block{margin-bottom:18px;padding:14px;background:#f8faff;border:1.5px solid var(--border);border-radius:10px;}
.sentence-jp{font-weight:700;font-size:.93em;margin-bottom:8px;color:var(--text);}
.word-squares{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.square{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:38px;padding:0 10px;border:2px solid var(--success);border-radius:8px;background:#fff;color:var(--primary-mid);font-weight:700;cursor:pointer;font-size:.95em;transition:.15s;font-family:'BIZ UDPGothic',sans-serif;}
.square:hover{background:var(--primary-light);}

/* 音声ボタン */
.voice-btn{background:var(--orange);color:#fff;border:none;padding:4px 10px;border-radius:50px;cursor:pointer;font-size:.78em;margin-left:6px;vertical-align:middle;}

/* a/anポップボタン */
.info-pop-btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82em;font-weight:700;margin-left:8px;animation:blink-btn 1.8s infinite;}
@keyframes blink-btn{0%,100%{transform:scale(1);}50%{transform:scale(1.08);background:#c0392b;}}

/* 単語ツールチップ */
.imp-word{color:var(--success);font-weight:700;text-decoration:underline;cursor:pointer;position:relative;display:inline-block;}
.tooltip{visibility:hidden;width:200px;background:#1e293b;color:#fff;text-align:center;padding:8px;border-radius:8px;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);z-index:10000;font-size:.82em;line-height:1.5;opacity:0;transition:.2s;pointer-events:auto;}
.imp-word:hover .tooltip,.imp-word:focus-within .tooltip{visibility:visible;opacity:1;}
.add-btn{background:var(--orange);color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.72em;margin-top:4px;pointer-events:auto;}

/* カード選択状態 */
.word-card.selected{background:var(--warn-light);border-color:var(--warn);}
.word-card.hidden{visibility:hidden;pointer-events:none;}

/* 固定ワードプール */
.fixed-pool{position:fixed;bottom:0;left:0;width:100%;background:#eef4ff;border-top:3px solid var(--primary);padding:12px 10px;z-index:999;text-align:center;display:none;}
.word-card{display:inline-block;background:#fff;border:1.5px solid var(--border);padding:8px 14px;margin:4px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.95em;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:'BIZ UDPGothic',sans-serif;}

/* ナビボタン */
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:20px;}
.btn-nav{font-family:'BIZ UDPGothic',sans-serif;font-size:.93em;font-weight:700;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-home{background:#e0e7ff;color:#3730a3;}
.btn-next{background:var(--primary);color:#fff;}

/* 単語帳テスト */
.btn-vocab-test{font-family:'BIZ UDPGothic',sans-serif;background:var(--success);color:#fff;border:none;padding:9px;width:100%;border-radius:8px;cursor:pointer;font-size:.88em;font-weight:700;margin-top:10px;}
.vocab-test-card{background:var(--card);border:2px solid var(--primary);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.vocab-q{font-size:clamp(1.1em,4vw,1.5em);font-weight:700;text-align:center;color:var(--primary);margin-bottom:14px;padding:10px;background:var(--primary-light);border-radius:8px;}
.vocab-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.vocab-choice{font-family:'BIZ UDPGothic',sans-serif;background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 8px;font-size:.88em;font-weight:700;cursor:pointer;text-align:center;transition:.15s;}
.vocab-choice:hover{background:var(--primary-light);border-color:var(--primary);}
.vocab-choice.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
.vocab-choice.wrong{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.vocab-score{text-align:center;padding:16px;font-size:1.1em;font-weight:700;}
.btn-vocab-retry{font-family:'BIZ UDPGothic',sans-serif;background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:50px;cursor:pointer;font-size:.9em;font-weight:700;margin-top:10px;}

</style>
</head>
<body>

<div class="page-header">
  <div class="unit-code">EA10</div>
  <h1>⚡ 爆速英文法：三単現のs</h1>
</div>

<nav class="step-nav">
  <button class="step-btn" id="btn-info"  onclick="changeStep('info')">1.説明</button>
  <button class="step-btn" id="btn-ex"    onclick="changeStep('ex')">2.例題</button>
  <button class="step-btn" id="btn-prac"  onclick="changeStep('prac')">3.類題</button>
  <button class="step-btn" id="btn-test"  onclick="changeStep('test')">4.テスト</button>
</nav>

<div class="g-container">

  <!-- タイマーバー -->
  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <button id="start-btn" class="btn-start" onclick="startChallenge()">▶ チャレンジ開始！</button>
  </div>

  <!-- メイン表示エリア -->
  <div id="display-area"></div>

  <!-- タイムレコード -->
  <div class="record-section">
    <div class="record-title">⏱ タイムレコード</div>
    <ul class="record-list">
      <li><span>1回目</span><span class="record-time" id="rec-0">--:--</span></li>
      <li><span>2回目</span><span class="record-time" id="rec-1">--:--</span></li>
      <li><span>3回目</span><span class="record-time" id="rec-2">--:--</span></li>
      <li><span>4回目</span><span class="record-time" id="rec-3">--:--</span></li>
      <li><span>5回目</span><span class="record-time" id="rec-4">--:--</span></li>
    </ul>
    <button class="btn-reset" onclick="resetRecords()">記録をリセット</button>
  </div>

  <!-- 単語帳 -->
  <div class="vocab-section">
    <div class="vocab-title">📗 マイ単語帳</div>
    <ul id="my-vocab" class="word-list"></ul>
    <button class="btn-vocab-test" onclick="startVocabTest()" id="btn-vocab-test">📝 単語テストをする</button>
  </div>

  <!-- 単語テストエリア -->
  <div id="vocab-test-area" style="display:none;"></div>

  <!-- ナビ -->
  <div class="nav-btns">
    <a href="index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <span></span>
  </div>

</div>

<!-- 固定ワードプール -->
<div id="pool-fixed" class="fixed-pool"><div id="word-pool"></div></div>


<script src="gamba_support.js"></script>
<script>init();</script>
</body>
</html>
