<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆速英文法｜EA20 as 原級 as / not as 原級 as</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--primary-mid:#2563eb;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--orange:#f97316;--purple:#7c3aed;--purple-light:#ede9fe;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:160px;}
.page-header{background:linear-gradient(135deg,#6d28d9 0%,#1a56a0 100%);color:#fff;padding:18px 20px 14px;text-align:center;box-shadow:0 4px 16px rgba(109,40,217,.35);}
.page-header .unit-code{font-size:.78em;opacity:.75;letter-spacing:.15em;margin-bottom:3px;}
.page-header h1{font-size:clamp(1.05em,3vw,1.42em);font-weight:700;margin:0 0 4px;}
.page-header .unit-sub{font-size:.8em;opacity:.82;}
.step-nav{display:flex;gap:4px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.step-btn{flex:1;padding:9px 2px;border:none;background:#e2e8f0;cursor:pointer;font-weight:700;border-radius:8px;font-size:clamp(.7em,1.8vw,.84em);font-family:'BIZ UDPGothic',sans-serif;color:var(--text-sub);transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step-btn.active{background:var(--primary);color:#fff;}.step-btn.completed{background:var(--success);color:#fff;}
.g-container{max-width:760px;margin:0 auto;padding:14px 14px 20px;}
.timer-bar{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.timer-display{font-size:clamp(1.8em,6vw,2.4em);font-weight:700;font-family:monospace;color:var(--accent);min-width:76px;text-align:center;}
.btn-start{font-family:'BIZ UDPGothic',sans-serif;background:var(--accent);color:#fff;border:none;padding:11px 22px;border-radius:50px;font-weight:700;font-size:clamp(.9em,2.5vw,1.05em);cursor:pointer;transition:.2s;}
.btn-start:hover{transform:translateY(-1px);}
.challenge-controls{display:none;flex-direction:row;flex-wrap:wrap;gap:6px;margin-top:6px;width:100%;}
.challenge-controls.visible{display:flex;}
.btn-stop{font-family:inherit;background:#64748b;color:#fff;padding:8px 12px;border:none;border-radius:8px;font-weight:700;font-size:.82em;cursor:pointer;flex:1;min-width:70px;}
.btn-retry{font-family:inherit;background:var(--warn);color:#fff;padding:8px 12px;border:none;border-radius:8px;font-weight:700;font-size:.82em;cursor:pointer;flex:1;min-width:70px;}
.btn-show-ans{font-family:inherit;background:var(--purple);color:#fff;padding:8px 12px;border:none;border-radius:8px;font-weight:700;font-size:.82em;cursor:pointer;flex:1;min-width:70px;}
.section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.section-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:var(--primary);color:#fff;border-radius:8px;font-weight:700;font-size:1em;margin-right:8px;flex-shrink:0;}
.section-title-row{display:flex;align-items:center;margin-bottom:14px;}
.section-title-text{font-size:1.05em;font-weight:700;color:var(--primary);}
.origin-box{background:#f8faff;border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:10px;}
.origin-en{font-size:1.05em;font-weight:700;color:var(--text);margin-bottom:4px;}
.origin-jp{font-size:.88em;color:var(--text-sub);}
.voice-btn{background:var(--orange);color:#fff;border:none;padding:3px 10px;border-radius:50px;cursor:pointer;font-size:.76em;vertical-align:middle;white-space:nowrap;margin-left:6px;}
.proc-box{background:var(--primary-light);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.proc-label{font-size:.82em;font-weight:700;color:var(--primary);margin-bottom:8px;}
.proc-step{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.proc-step:last-child{margin-bottom:0;}
.proc-arrow{color:var(--primary);font-size:1.1em;flex-shrink:0;margin-top:1px;}
.proc-txt{font-size:.92em;line-height:1.65;flex:1;}
.proc-txt strong{color:var(--primary);}
.point-box{background:linear-gradient(135deg,#fffbeb,#dbeafe);border:2px solid var(--warn);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
.point-title{font-weight:700;color:var(--warn);font-size:.95em;margin-bottom:8px;}
.point-formula{font-size:1.02em;font-weight:700;color:var(--primary);background:#fff;border-radius:8px;padding:10px 14px;text-align:center;margin:6px 0;line-height:1.8;}
.point-formula .wh{color:var(--purple);}
.drill-box{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.drill-num{font-size:.82em;font-weight:700;color:var(--text-sub);margin-bottom:6px;}
.drill-src{font-size:.95em;color:var(--text);margin-bottom:4px;}
.bracket-answer-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin:8px 0;}
.bk-blank{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:32px;border:2px solid var(--success);border-radius:6px;background:#fff;font-weight:700;font-size:.9em;color:var(--primary-mid);cursor:pointer;transition:.15s;padding:0 6px;}
.bk-blank.is-active{background:var(--success-light);}
.drill-result{font-size:.88em;color:var(--text-sub);margin-top:6px;}
.fixed-mark{font-weight:700;font-size:1.1em;padding:0 2px;vertical-align:middle;}
.sentence-block{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.sentence-jp{font-weight:700;font-size:.9em;margin-bottom:8px;color:var(--text);}
.word-squares{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.square{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:38px;padding:0 10px;border:2px solid var(--success);border-radius:8px;background:#fff;color:var(--primary-mid);font-weight:700;cursor:pointer;font-size:.92em;transition:.15s;font-family:'BIZ UDPGothic',sans-serif;}
.square:hover{background:var(--primary-light);}
.imp-word{color:var(--success);font-weight:700;text-decoration:underline;cursor:pointer;position:relative;display:inline-block;}
.tooltip{visibility:hidden;width:200px;background:#1e293b;color:#fff;text-align:center;padding:8px;border-radius:8px;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);z-index:10000;font-size:.8em;line-height:1.5;opacity:0;transition:.2s;pointer-events:auto;}
.imp-word:hover .tooltip{visibility:visible;opacity:1;}
.add-btn{background:var(--orange);color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.72em;margin-top:4px;pointer-events:auto;margin-left:2px;}
.record-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;}
.record-title{font-size:.88em;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:6px;margin-bottom:10px;}
.record-list{list-style:none;padding:0;}
.record-list li{display:flex;justify-content:space-between;padding:6px 4px;font-size:.86em;border-bottom:1px solid var(--border);}
.record-list li:last-child{border-bottom:none;}
.record-time{font-family:monospace;font-weight:700;color:var(--primary);}
.btn-reset{font-family:'BIZ UDPGothic',sans-serif;background:#f1f5f9;color:var(--text-sub);border:none;padding:7px;width:100%;border-radius:8px;cursor:pointer;font-size:.82em;margin-top:8px;}
.vocab-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;}
.vocab-title{font-size:.88em;font-weight:700;color:var(--success);border-bottom:2px solid var(--success);padding-bottom:6px;margin-bottom:10px;}
.word-list{list-style:none;padding:0;}
.word-list li{background:var(--success-light);margin-bottom:5px;padding:7px 10px;border-radius:7px;font-size:.86em;border-left:4px solid var(--success);}
.btn-vocab-test{font-family:'BIZ UDPGothic',sans-serif;background:var(--success);color:#fff;border:none;padding:9px;width:100%;border-radius:8px;cursor:pointer;font-size:.88em;font-weight:700;margin-top:10px;}
.vocab-test-card{background:var(--card);border:2px solid var(--primary);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.vocab-q{font-size:clamp(1.1em,4vw,1.5em);font-weight:700;text-align:center;color:var(--primary);margin-bottom:14px;padding:10px;background:var(--primary-light);border-radius:8px;}
.vocab-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.vocab-choice{font-family:'BIZ UDPGothic',sans-serif;background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 8px;font-size:.86em;font-weight:700;cursor:pointer;text-align:center;transition:.15s;}
.vocab-choice:hover{background:var(--primary-light);border-color:var(--primary);}
.vocab-choice.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
.vocab-choice.wrong{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.vocab-score{text-align:center;padding:16px;font-size:1.1em;font-weight:700;}
.btn-vocab-retry{font-family:'BIZ UDPGothic',sans-serif;background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:50px;cursor:pointer;font-size:.9em;font-weight:700;margin-top:10px;}
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:16px;}
.btn-nav{font-family:'BIZ UDPGothic',sans-serif;font-size:.92em;font-weight:700;padding:11px 22px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:.15s;}
.btn-nav:hover{transform:translateY(-1px);}
.btn-home{background:#e0e7ff;color:#3730a3;}.btn-prev{background:#f1f5f9;color:var(--text-sub);}.btn-next{background:var(--primary);color:#fff;}
.fixed-pool{position:fixed;bottom:0;left:0;width:100%;background:#eef4ff;border-top:3px solid var(--primary);padding:12px 10px;z-index:999;text-align:center;display:none;}
.word-card{display:inline-block;background:#fff;border:1.5px solid var(--border);padding:8px 14px;margin:4px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.93em;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:'BIZ UDPGothic',sans-serif;}
.word-card.selected{background:var(--warn-light);border-color:var(--warn);}
.word-card.hidden{visibility:hidden;pointer-events:none;}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">EA20</div>
  <h1>⚡ 爆速英文法：as 原級 as / not as 原級 as</h1>
  <div class="unit-sub">〜と同じくらい… / …ほど〜ではない（同等比較）</div>
</div>
<nav class="step-nav">
  <button class="step-btn" id="btn-info" onclick="changeStep('info')">1.説明</button>
  <button class="step-btn" id="btn-ex"   onclick="changeStep('ex')">2.例題</button>
  <button class="step-btn" id="btn-prac" onclick="changeStep('prac')">3.類題</button>
  <button class="step-btn" id="btn-test" onclick="changeStep('test')">4.テスト</button>
</nav>
<div class="g-container">
  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <button id="start-btn" class="btn-start" onclick="startChallenge()">▶ チャレンジ開始！</button>
      <div class="challenge-controls" id="challenge-controls">
        <button class="btn-stop" onclick="stopChallenge()">⏹ ストップ</button>
        <button class="btn-retry" onclick="retryChallenge()">↩ 元に戻す</button>
        <button class="btn-show-ans" onclick="showAnswers()">👁 答えを見る</button>
      </div>
    </div>
  </div>
  <div id="display-area"></div>
  <div class="record-section">
    <div class="record-title">⏱ タイムレコード</div>
    <ul class="record-list">
      <li><span>1回目</span><span class="record-time" id="rec-0">--:--</span></li>
      <li><span>2回目</span><span class="record-time" id="rec-1">--:--</span></li>
      <li><span>3回目</span><span class="record-time" id="rec-2">--:--</span></li>
      <li><span>4回目</span><span class="record-time" id="rec-3">--:--</span></li>
      <li><span>5回目</span><span class="record-time" id="rec-4">--:--</span></li>
    </ul>
    <button class="btn-reset" onclick="resetRecords()">記録をリセット</button>
  </div>
  <div class="vocab-section">
    <div class="vocab-title">📗 マイ単語帳</div>
    <ul id="my-vocab" class="word-list"></ul>
    <button class="btn-vocab-test" onclick="startVocabTest()">📝 単語テストをする</button>
  </div>
  <div id="vocab-test-area" style="display:none;"></div>
  <div class="nav-btns">
    <a href="index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="EA19.html" class="btn-nav btn-prev">← EA19へ</a>
    <a href="EA21.html" class="btn-nav btn-next">EA21へ →</a>
  </div>
</div>
<div id="pool-fixed" class="fixed-pool"><div id="word-pool"></div></div>
<script>
const DICT={
  "as":"アズ (接)〜と同じくらい・〜ほど",
  "He":"ヒー (代)彼は",
  "She":"シー (代)彼女は",
  "I":"アイ (代)私は",
  "You":"ユー (代)あなたは",
  "you":"ユー (代)あなた・あなたと",
  "he":"ヒー (代)彼・彼と",
  "she":"シー (代)彼女・彼女と",
  "is":"イズ (動)〜です",
  "are":"アー (動)〜です",
  "am":"アム (動)〜です",
  "can":"キャン (助)〜できる",
  "can't":"キャント (助)〜できない",
  "isn't":"イズント (動)〜ではない",
  "aren't":"アーント (動)〜ではない",
  "not":"ノット (副)〜ない",
  "old":"オールド (形)年をとった・古い",
  "tall":"トール (形)背が高い",
  "young":"ヤング (形)若い",
  "fast":"ファスト (副/形)速く・速い",
  "well":"ウェル (副)上手に",
  "new":"ニュー (形)新しい",
  "short":"ショート (形)短い・背が低い",
  "easy":"イージー (形)簡単な",
  "difficult":"ディフィカルト (形)難しい",
  "run":"ラン (動)走る",
  "swim":"スウィム (動)泳ぐ",
  "sing":"スィング (動)歌う",
  "speak":"スピーク (動)話す",
  "play":"プレイ (動)する・弾く",
  "swims":"スウィムズ (動)泳ぐ（三単現）",
  "runs":"ランズ (動)走る（三単現）",
  "gets":"ゲッツ (動)起きる（三単現）",
  "up":"アップ (副)起きて",
  "tennis":"テニス (名)テニス",
  "English":"イングリッシュ (名)英語",
  "pen":"ペン (名)ペン",
  "My":"マイ (代)私の",
  "my":"マイ (代)私の",
  "yours":"ユアーズ (代)あなたのもの",
  "question":"クエスチョン (名)問題・質問",
  "This":"ジス (代)この",
  "that":"ザット (代)あの・あれ",
  "one":"ワン (代)もの・こと（繰り返し避ける）",
};
const INFO_DRILLS=[
  {num:"(1)",src:"彼女はあなたと同じくらいの年です。",ans:["She","is","as","old","as","you"],jp:"She is as old as you.",mark:"."},
  {num:"(2)",src:"彼は私と同じくらい背が高い。",ans:["He","is","as","tall","as","I"],jp:"He is as tall as I.",mark:"."},
  {num:"(3)",src:"彼女は私と同じくらい速く走ることができます。",ans:["She","can","run","as","fast","as","I"],jp:"She can run as fast as I.",mark:"."},
  {num:"(4)",src:"彼はあなたほど背は高くない。",ans:["He","is","not","as","tall","as","you"],jp:"He is not as tall as you.",mark:"."},
  {num:"(5)",src:"彼はあなたほど速く泳ぐことはできない。",ans:["He","can't","swim","as","fast","as","you"],jp:"He can't swim as fast as you.",mark:"."},
  {num:"(6)",src:"私のペンはあなたのと同じくらい新しい。",ans:["My","pen","is","as","new","as","yours"],jp:"My pen is as new as yours.",mark:"."},
];
const MASTER_DATA={
  ex:[
    {jp:"彼女はあなたと同じくらいの年です。",en:["She","is","as","old","as","you"],mark:"."},
    {jp:"彼は私と同じくらい背が高い。",en:["He","is","as","tall","as","I"],mark:"."},
    {jp:"彼女は私と同じくらい速く走ることができます。",en:["She","can","run","as","fast","as","I"],mark:"."},
    {jp:"彼はあなたと同じくらい上手に英語を話すことができます。",en:["He","can","speak","English","as","well","as","you"],mark:"."},
    {jp:"あなたは彼ほど若くない。",en:["You","aren't","as","young","as","he"],mark:"."},
    {jp:"彼はあなたほど速く泳ぐことはできない。",en:["He","can't","swim","as","fast","as","you"],mark:"."},
  ],
  prac:[
    {jp:"彼は私と同じくらい速く泳ぎます。",en:["He","swims","as","fast","as","I"],mark:"."},
    {jp:"彼女は私と同じくらい上手にテニスをすることができます。",en:["She","can","play","tennis","as","well","as","I"],mark:"."},
    {jp:"彼は私と同じくらい上手に英語を話すことができます。",en:["He","can","speak","English","as","well","as","I"],mark:"."},
    {jp:"この問題はあの問題と同じくらい難しい。",en:["This","question","is","as","difficult","as","that","one"],mark:".",note:"💡 one = question の繰り返しを避けた代名詞"},
    {jp:"彼女は私ほど若くはない。",en:["She","isn't","as","young","as","I"],mark:"."},
    {jp:"彼はあなたほど上手に英語をしゃべれない。",en:["He","can't","speak","English","as","well","as","you"],mark:"."},
  ],
  test:[
    {jp:"彼は私と同じくらい背が高い。",en:["He","is","as","tall","as","I"],mark:"."},
    {jp:"彼女は私と同じくらい速く走ることができます。",en:["She","can","run","as","fast","as","I"],mark:"."},
    {jp:"この問題はあの問題と同じくらい難しい。",en:["This","question","is","as","difficult","as","that","one"],mark:".",note:"💡 one = question の繰り返しを避けた代名詞"},
    {jp:"彼はあなたほど背は高くない。",en:["He","is","not","as","tall","as","you"],mark:"."},
    {jp:"彼女は私ほど若くはない。",en:["She","isn't","as","young","as","I"],mark:"."},
    {jp:"彼はあなたほど上手に英語をしゃべれない。",en:["He","can't","speak","English","as","well","as","you"],mark:"."},
  ]
};
let currentMode='info',isChallenging=false,selectedWord=null,selectedId=null,startTime,timerInterval;
let records=[null,null,null,null,null];
function speak(text){if(!window.speechSynthesis)return;const s=window.speechSynthesis;s.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.82;function d(){const vs=s.getVoices();if(vs.length>0){const v=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));if(v)u.voice=v;}setTimeout(()=>{try{s.speak(u);}catch(e){}},50);}if(s.getVoices().length===0){s.onvoiceschanged=()=>{s.onvoiceschanged=null;d();};setTimeout(()=>{s.onvoiceschanged=null;d();},1500);}else d();}
function speakData(btn){speak(btn.getAttribute('data-sp'));}
function wrapWord(word){const key=Object.keys(DICT).find(k=>k.toLowerCase()===word.toLowerCase().replace(/[.,?!']/g,''));if(key)return`<span class="imp-word">${word}<span class="tooltip">${DICT[key]}<br><button class="add-btn" onclick="event.stopPropagation();speak('${word}')">🔊</button><button class="add-btn" onclick="event.stopPropagation();addToVocab('${key}')">📗</button></span></span>`;return word;}
function addToVocab(word){const list=document.getElementById('my-vocab');if([...list.querySelectorAll('strong')].some(s=>s.textContent===word))return;const li=document.createElement('li');li.innerHTML=`<strong>${word}</strong> <button onclick="speak('${word}')" style="background:var(--orange);color:#fff;border:none;padding:2px 7px;border-radius:50px;font-size:.72em;cursor:pointer;margin-left:4px;">🔊</button><br><small style="color:var(--text-sub)">${DICT[word]||''}</small>`;list.appendChild(li);}
function changeStep(mode){currentMode=mode;isChallenging=false;clearInterval(timerInterval);document.getElementById('timer').textContent='00:00';document.getElementById('pool-fixed').style.display='none';document.getElementById('start-btn').style.display='block';const cc=document.getElementById('challenge-controls');if(cc)cc.classList.remove('visible');document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+mode).classList.add('active');render();}
function renderInfo(){
  return`
  <div class="section">
    <div class="section-title-row"><span class="section-num">1</span><span class="section-title-text">as 原級 as 〜「〜と同じくらい…」</span></div>
    <div class="proc-box">
      <div class="proc-label">📌 as 〜 as の作り方</div>
      <div class="proc-step"><div class="proc-arrow">①</div><div class="proc-txt">形容詞・副詞の<strong>原級</strong>（変化しない元の形）をそのまま使う</div></div>
      <div class="proc-step"><div class="proc-arrow">②</div><div class="proc-txt">語順：主語 ＋ 動詞 ＋ <strong>as</strong> ＋ 原級 ＋ <strong>as</strong> ＋ 主語</div></div>
      <div class="proc-step"><div class="proc-arrow">③</div><div class="proc-txt">2つ目の as は接続詞 → 後ろは<strong>主格</strong>（I / he / she）を使う</div></div>
    </div>
    <div class="origin-box">
      <div class="origin-en">He is <strong>as tall as I</strong>. <button class="voice-btn" onclick="speak('He is as tall as I.')">🔊</button></div>
      <div class="origin-jp">彼は私と同じくらい背が高い。</div>
    </div>
    <div class="origin-box">
      <div class="origin-en">She can run <strong>as fast as I</strong>. <button class="voice-btn" onclick="speak('She can run as fast as I.')">🔊</button></div>
      <div class="origin-jp">彼女は私と同じくらい速く走ることができます。</div>
    </div>
    <div class="point-box"><div class="point-title">📌 as 原級 as の公式</div>
    <div class="point-formula">主語 ＋ 動詞 ＋ <span class="wh">as</span> ＋ 原級 ＋ <span class="wh">as</span> ＋ 主格</div>
    <div class="point-formula">「〜と<span class="wh">同じくらい</span>…だ」</div></div>
  </div>
  <div class="section">
    <div class="section-title-row"><span class="section-num">2</span><span class="section-title-text">not as 原級 as 〜「…ほど〜ではない」</span></div>
    <div class="proc-box">
      <div class="proc-label">📌 否定形：not as 〜 as</div>
      <div class="proc-step"><div class="proc-arrow">①</div><div class="proc-txt">be動詞の後に <strong>not</strong> を入れる → is not / are not / isn't / aren't</div></div>
      <div class="proc-step"><div class="proc-arrow">②</div><div class="proc-txt">助動詞なら <strong>can't</strong> など</div></div>
    </div>
    <div class="origin-box">
      <div class="origin-en">He is <strong>not as tall as</strong> you. <button class="voice-btn" onclick="speak('He is not as tall as you.')">🔊</button></div>
      <div class="origin-jp">彼はあなたほど背は高くない。</div>
    </div>
    <div class="origin-box">
      <div class="origin-en">He <strong>can't swim as fast as</strong> you. <button class="voice-btn" onclick="speak('He can\'t swim as fast as you.')">🔊</button></div>
      <div class="origin-jp">彼はあなたほど速く泳ぐことはできない。</div>
    </div>
    <div class="point-box"><div class="point-title">📌 not as 原級 as の公式</div>
    <div class="point-formula">主語 ＋ 動詞 ＋ <span class="wh">not as</span> ＋ 原級 ＋ <span class="wh">as</span> ＋ 主格</div>
    <div class="point-formula">「…ほど<span class="wh">〜ではない</span>」</div></div>
  </div>
  <div class="section">
    <div class="section-title-row"><span class="section-num" style="background:var(--success);">練</span><span class="section-title-text">練習問題</span></div>
    ${INFO_DRILLS.map((d,i)=>`
    <div class="drill-box">
      <div class="drill-num">${d.num}</div>
      <div class="drill-src">${d.src}</div>
      <div class="bracket-answer-row" id="drill-row-${i}">
        ${d.ans.map((w,j)=>`<span class="bk-blank" data-ans="${w}" data-drill="${i}" data-idx="${j}" onclick="handleDrillClick(this)">${isChallenging?'':w}</span>`).join('')}
        <span class="fixed-mark">${d.mark}</span>
        <button class="voice-btn" onclick="speakData(this)" data-sp="${d.ans.join(' ')+d.mark}" style="margin-left:6px;">🔊</button>
      </div>
      <div class="drill-result">${d.jp}</div>
    </div>`).join('')}
  </div>`;
}
function render(){
  const area=document.getElementById('display-area');
  if(currentMode==='info'){area.innerHTML=renderInfo();if(!isChallenging)document.querySelectorAll('.bk-blank').forEach(el=>el.textContent=el.dataset.ans);}
  else{
    const titles={ex:'例題',prac:'類題',test:'修了テスト'};
    let html=`<div class="section"><h2 style="font-size:1em;font-weight:700;color:var(--primary);border-left:4px solid var(--primary);padding-left:10px;margin-bottom:14px;">${titles[currentMode]}演習（各6問）</h2><p style="font-size:.85em;color:var(--text-sub);margin-bottom:14px;"><strong>as 原級 as</strong>（同じくらい）・<strong>not as 原級 as</strong>（〜ほどでない）に注意して並べ替えよう！</p>`;
    MASTER_DATA[currentMode].forEach(q=>{
      const sp=q.en.join(' ')+q.mark;
      html+=`<div class="sentence-block"><div class="sentence-jp">${q.jp} <button class="voice-btn" onclick="speakData(this)" data-sp="${sp}">🔊</button></div><div class="word-squares">${q.en.map(w=>`<span class="square" data-ans="${w}" onclick="handleTargetClick(this)">${isChallenging?'':wrapWord(w)}</span>`).join('')}<span class="fixed-mark">${q.mark}</span></div>${q.note?`<div style="font-size:.78em;color:var(--text-sub);margin-top:6px;padding:4px 8px;background:#f1f5f9;border-radius:6px;">${q.note}</div>`:''}</div>`;
    });
    area.innerHTML=html+'</div>';
  }
}
function handleDrillClick(el){if(!isChallenging||!selectedWord||el.textContent!=='')return;if(selectedWord===el.dataset.ans){el.textContent=selectedWord;el.style.background='var(--success-light)';el.style.borderColor='var(--success)';el.style.color='var(--success)';document.getElementById(selectedId).classList.add('hidden');selectedWord=null;if([...document.querySelectorAll('.bk-blank,.square')].every(s=>s.textContent!==''))finishStep();}else{alert('もうチョイ！as 原級 as の語順を確認しよう！');}}
function handleTargetClick(el){if(!isChallenging||!selectedWord||el.textContent!=='')return;if(selectedWord===el.dataset.ans){el.textContent=selectedWord;el.classList.remove('is-active');document.getElementById(selectedId).classList.add('hidden');selectedWord=null;if([...document.querySelectorAll('.bk-blank,.square')].every(s=>s.textContent!==''))finishStep();}else{alert('もうチョイ！');}}
function startChallenge(){isChallenging=true;render();if(currentMode==='info')document.querySelectorAll('.bk-blank').forEach(el=>{el.textContent='';el.classList.add('is-active');});document.getElementById('pool-fixed').style.display='block';document.getElementById('start-btn').style.display='none';document.getElementById('challenge-controls').classList.add('visible');renderPool();startTime=Date.now();timerInterval=setInterval(()=>{const d=Math.floor((Date.now()-startTime)/1000);document.getElementById('timer').textContent=String(Math.floor(d/60)).padStart(2,'0')+':'+String(d%60).padStart(2,'0');},100);}
function renderPool(){const pool=document.getElementById('word-pool');pool.innerHTML='';let words=[];if(currentMode==='info')INFO_DRILLS.forEach(d=>d.ans.forEach(w=>words.push(w)));else MASTER_DATA[currentMode].forEach(q=>q.en.forEach(w=>words.push(w)));words.sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));words.forEach((w,i)=>{const card=document.createElement('div');card.className='word-card';card.id='c-'+i;card.textContent=w;card.onclick=()=>{speak(w);selectedWord=w;selectedId=card.id;document.querySelectorAll('.word-card').forEach(c=>c.classList.remove('selected'));card.classList.add('selected');};pool.appendChild(card);});}
function finishStep(){clearInterval(timerInterval);const t=document.getElementById('timer').textContent;alert('🎉 合格！よくできました！');document.getElementById('btn-'+currentMode).classList.add('completed');if(currentMode!=='info'){for(let i=0;i<5;i++){if(records[i]===null){records[i]=t;document.getElementById('rec-'+i).textContent=t;break;}}}if(currentMode==='test')localStorage.setItem('gamba_prog_EA20','pass');isChallenging=false;document.getElementById('challenge-controls').classList.remove('visible');document.getElementById('start-btn').style.display='block';document.getElementById('pool-fixed').style.display='none';}
function stopChallenge(){if(!isChallenging)return;clearInterval(timerInterval);isChallenging=false;selectedWord=null;document.getElementById('pool-fixed').style.display='none';document.getElementById('start-btn').style.display='block';document.getElementById('challenge-controls').classList.remove('visible');}
function retryChallenge(){clearInterval(timerInterval);isChallenging=false;selectedWord=null;startChallenge();}
function showAnswers(){clearInterval(timerInterval);isChallenging=false;document.getElementById('pool-fixed').style.display='none';document.getElementById('start-btn').style.display='block';document.getElementById('challenge-controls').classList.remove('visible');document.querySelectorAll('.bk-blank,.square').forEach(el=>{if(el.dataset.ans&&el.textContent.trim()===''){el.textContent=el.dataset.ans;el.style.color='#7c3aed';el.style.background='#ede9fe';el.style.borderColor='#7c3aed';}});document.querySelectorAll('.word-card').forEach(c=>c.classList.add('hidden'));}
function resetRecords(){if(!confirm('リセットしますか？'))return;records=[null,null,null,null,null];for(let i=0;i<5;i++)document.getElementById('rec-'+i).textContent='--:--';document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('completed'));changeStep('info');}
function getMean(raw){const p=raw.split(')');return p.length>=2?p[p.length-1].trim():raw.trim();}
let vtQ=[],vtIdx=0,vtOk=0;
function startVocabTest(){const items=[...document.getElementById('my-vocab').children];const area=document.getElementById('vocab-test-area');if(items.length===0){alert('単語帳にまだ単語がありません！');return;}vtQ=items.map(li=>({word:li.querySelector('strong')?.textContent.trim()||'',mean:getMean(li.querySelector('small')?.textContent.trim()||'')})).filter(v=>v.word&&v.mean);vtQ.sort(()=>Math.random()-.5);vtIdx=0;vtOk=0;area.style.display='block';renderVtQ();area.scrollIntoView({behavior:'smooth',block:'start'});}
function renderVtQ(){const area=document.getElementById('vocab-test-area'),total=vtQ.length;if(vtIdx>=total){renderVtEnd();return;}const q=vtQ[vtIdx];const pool=Object.values(DICT).map(getMean).filter(m=>m&&m!==q.mean).sort(()=>Math.random()-.5);const choices=[q.mean,...pool.slice(0,3)].sort(()=>Math.random()-.5);const pct=Math.round(vtIdx/total*100);const btns=choices.map(ch=>`<button class="vocab-choice" onclick="checkVtA(this,${JSON.stringify(ch)},${JSON.stringify(q.mean)},${JSON.stringify(q.word)})">${ch}</button>`).join('');area.innerHTML=`<div class="vocab-test-card"><div style="font-size:.82em;color:var(--text-sub);font-weight:700;margin-bottom:10px;">📝 単語テスト ${vtIdx+1}/${total}問<div style="background:var(--border);border-radius:4px;height:5px;margin-top:6px;"><div style="background:var(--primary);height:5px;border-radius:4px;width:${pct}%;"></div></div></div><div class="vocab-q">${q.word} <button onclick="speak('${q.word}')" style="background:var(--orange);color:#fff;border:none;padding:3px 10px;border-radius:50px;font-size:.72em;cursor:pointer;vertical-align:middle;">🔊</button></div><div class="vocab-choices">${btns}</div></div>`;}
function checkVtA(btn,chosen,correct,word){[...btn.parentElement.querySelectorAll('.vocab-choice')].forEach(b=>{b.disabled=true;if(b.textContent.trim()===correct)b.classList.add('correct');});const ok=chosen.trim()===correct.trim();if(ok){btn.classList.add('correct');vtOk++;}else btn.classList.add('wrong');setTimeout(()=>{vtIdx++;renderVtQ();},ok?700:1400);}
function renderVtEnd(){const total=vtQ.length,area=document.getElementById('vocab-test-area');const msg=vtOk===total?'🎉 全問正解！':vtOk>=total*.75?'👍 あと少し！':'📖 もう一度復習しよう！';area.innerHTML=`<div class="vocab-test-card" style="text-align:center;"><div class="vocab-score" style="color:${vtOk===total?'var(--success)':'var(--accent)'};">${msg}<br>${vtOk}/${total} 正解</div><button class="btn-vocab-retry" onclick="startVocabTest()">🔁 もう一度</button> <button class="btn-vocab-retry" style="background:var(--text-sub);" onclick="document.getElementById('vocab-test-area').style.display='none'">✕ 閉じる</button></div>`;}
window.addEventListener('pagehide',()=>{if(window.speechSynthesis)speechSynthesis.cancel();});
changeStep('info');
</script>
<script src="gamba_support.js"></script>
