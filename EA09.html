<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆速英文法｜EA09 名詞の複数形</title>
<style>
:root{
  --primary:#1a56a0;--primary-light:#dbeafe;--primary-mid:#2563eb;
  --accent:#e8372d;--accent-light:#fff1f0;
  --success:#16a34a;--success-light:#dcfce7;
  --warn:#d97706;--warn-light:#fffbeb;
  --orange:#f97316;--orange-light:#fff7ed;
  --bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;
  --text:#1e293b;--text-sub:#64748b;--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:160px;}

/* ヘッダー */
.page-header{background:var(--primary);color:#fff;padding:16px 20px 12px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.8em;opacity:.8;letter-spacing:.1em;margin-bottom:3px;}
.page-header h1{font-size:clamp(1.05em,3vw,1.4em);font-weight:700;margin:0;}

/* ステップナビ */
.step-nav{display:flex;gap:3px;padding:8px;background:var(--card);border-bottom:1px solid var(--border);}
.step-btn{flex:1;padding:8px 2px;border:none;background:#e2e8f0;cursor:pointer;font-weight:700;border-radius:8px;font-size:clamp(.68em,2.2vw,.82em);font-family:'BIZ UDPGothic',sans-serif;color:var(--text-sub);transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,86,160,.3);}
.step-btn.completed{background:var(--success);color:#fff;}

/* メインコンテナ */
.g-container{max-width:760px;margin:0 auto;padding:16px 14px;}

/* タイマーバー */
.timer-bar{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.timer-display{font-size:clamp(1.8em,6vw,2.4em);font-weight:700;font-family:monospace;color:var(--accent);min-width:80px;text-align:center;}
.btn-start{font-family:'BIZ UDPGothic',sans-serif;background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:50px;font-weight:700;font-size:clamp(.95em,2.5vw,1.1em);cursor:pointer;box-shadow:0 3px 10px rgba(232,55,45,.3);transition:.2s;}
.btn-start:hover{transform:translateY(-1px);}

/* 記録 */
.record-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;}
.record-title{font-size:.88em;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:6px;margin-bottom:10px;}
.record-list{list-style:none;padding:0;}
.record-list li{display:flex;justify-content:space-between;padding:6px 4px;font-size:.88em;border-bottom:1px solid var(--border);}
.record-list li:last-child{border-bottom:none;}
.record-time{font-family:monospace;font-weight:700;color:var(--primary);}
.btn-reset{font-family:'BIZ UDPGothic',sans-serif;background:#f1f5f9;color:var(--text-sub);border:none;padding:7px;width:100%;border-radius:8px;cursor:pointer;font-size:.82em;margin-top:8px;}

/* 単語帳 */
.vocab-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;}
.vocab-title{font-size:.88em;font-weight:700;color:var(--success);border-bottom:2px solid var(--success);padding-bottom:6px;margin-bottom:10px;}
.word-list{list-style:none;padding:0;}
.word-list li{background:var(--success-light);margin-bottom:5px;padding:7px 10px;border-radius:7px;font-size:.88em;border-left:4px solid var(--success);}

/* セクション */
.section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.section h2{font-size:1.02em;font-weight:700;color:var(--primary);border-left:4px solid var(--primary);padding-left:10px;margin-bottom:14px;}

/* 表 */
.eng-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.93em;}
.eng-table th{background:var(--primary);color:#fff;padding:10px;text-align:center;border:1px solid var(--border);}
.eng-table td{border:1px solid var(--border);padding:10px;text-align:center;}
.eng-table tr:nth-child(even) td{background:var(--primary-light);}
.eng-table .td-left{text-align:left;padding-left:14px;}

/* 空欄 */
.blank{display:inline-block;min-width:54px;height:28px;border-bottom:2.5px solid var(--success);vertical-align:middle;text-align:center;color:var(--primary-mid);font-weight:700;cursor:pointer;transition:.2s;}
.blank.is-active{background:var(--success-light);border:2px solid var(--success);border-radius:5px;}

/* 単語カード（並べ替え） */
.sentence-block{margin-bottom:18px;padding:14px;background:#f8faff;border:1.5px solid var(--border);border-radius:10px;}
.sentence-jp{font-weight:700;font-size:.93em;margin-bottom:8px;color:var(--text);}
.word-squares{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.square{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:38px;padding:0 10px;border:2px solid var(--success);border-radius:8px;background:#fff;color:var(--primary-mid);font-weight:700;cursor:pointer;font-size:.95em;transition:.15s;font-family:'BIZ UDPGothic',sans-serif;}
.square:hover{background:var(--primary-light);}

/* 音声ボタン */
.voice-btn{background:var(--orange);color:#fff;border:none;padding:4px 10px;border-radius:50px;cursor:pointer;font-size:.78em;margin-left:6px;vertical-align:middle;}

/* a/anポップボタン */
.info-pop-btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82em;font-weight:700;margin-left:8px;animation:blink-btn 1.8s infinite;}
@keyframes blink-btn{0%,100%{transform:scale(1);}50%{transform:scale(1.08);background:#c0392b;}}

/* 単語ツールチップ */
.imp-word{color:var(--success);font-weight:700;text-decoration:underline;cursor:pointer;position:relative;display:inline-block;}
.tooltip{visibility:hidden;width:200px;background:#1e293b;color:#fff;text-align:center;padding:8px;border-radius:8px;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);z-index:10000;font-size:.82em;line-height:1.5;opacity:0;transition:.2s;pointer-events:auto;}
.imp-word:hover .tooltip,.imp-word:focus-within .tooltip{visibility:visible;opacity:1;}
.add-btn{background:var(--orange);color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.72em;margin-top:4px;pointer-events:auto;}

/* カード選択状態 */
.word-card.selected{background:var(--warn-light);border-color:var(--warn);}
.word-card.hidden{visibility:hidden;pointer-events:none;}

/* 固定ワードプール */
.fixed-pool{position:fixed;bottom:0;left:0;width:100%;background:#eef4ff;border-top:3px solid var(--primary);padding:12px 10px;z-index:999;text-align:center;display:none;}
.word-card{display:inline-block;background:#fff;border:1.5px solid var(--border);padding:8px 14px;margin:4px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.95em;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:'BIZ UDPGothic',sans-serif;}

/* ナビボタン */
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:20px;}
.btn-nav{font-family:'BIZ UDPGothic',sans-serif;font-size:.93em;font-weight:700;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-home{background:#e0e7ff;color:#3730a3;}
.btn-next{background:var(--primary);color:#fff;}

/* 単語帳テスト */
.btn-vocab-test{font-family:'BIZ UDPGothic',sans-serif;background:var(--success);color:#fff;border:none;padding:9px;width:100%;border-radius:8px;cursor:pointer;font-size:.88em;font-weight:700;margin-top:10px;}
.vocab-test-card{background:var(--card);border:2px solid var(--primary);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.vocab-q{font-size:clamp(1.1em,4vw,1.5em);font-weight:700;text-align:center;color:var(--primary);margin-bottom:14px;padding:10px;background:var(--primary-light);border-radius:8px;}
.vocab-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.vocab-choice{font-family:'BIZ UDPGothic',sans-serif;background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 8px;font-size:.88em;font-weight:700;cursor:pointer;text-align:center;transition:.15s;}
.vocab-choice:hover{background:var(--primary-light);border-color:var(--primary);}
.vocab-choice.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
.vocab-choice.wrong{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.vocab-score{text-align:center;padding:16px;font-size:1.1em;font-weight:700;}
.btn-vocab-retry{font-family:'BIZ UDPGothic',sans-serif;background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:50px;cursor:pointer;font-size:.9em;font-weight:700;margin-top:10px;}


/* ── 代名詞表・複数形表などの専用スタイル ── */
.ruby{font-size:.72em;color:var(--text-sub);font-weight:700;margin-right:2px;display:inline-block;}
table.pronoun-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9em;}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9em;}
th{background:var(--primary);color:#fff;padding:10px 8px;text-align:center;border:1px solid var(--primary-mid);font-size:.88em;}
td{border:1px solid var(--border);padding:9px 8px;text-align:center;vertical-align:middle;}
tr:nth-child(even) td{background:var(--primary-light);}
.check-box{background:var(--primary-light);border:1.5px solid var(--primary);border-radius:10px;padding:12px 16px;margin:10px 0;line-height:2;font-size:.93em;}
.check-jp{font-weight:700;display:block;margin-bottom:4px;color:var(--primary);}


/* ── コンテンツ内のリスト ── */
.section ul{padding-left:18px;margin:10px 0;line-height:2;}
.section li{font-size:.93em;margin-bottom:4px;}
.section li strong{color:var(--primary);}
.section p{font-size:.93em;line-height:1.9;margin-bottom:10px;}
.section p strong{color:var(--primary);}


/* ── EA10専用スタイル ── */
.rule-card{border-left:5px solid var(--accent);background:var(--accent-light);padding:14px 18px;border-radius:0 10px 10px 0;margin:12px 0;font-size:.92em;line-height:1.9;}
.blue-card{border-left:5px solid var(--primary);background:var(--primary-light);padding:14px 18px;border-radius:0 10px 10px 0;margin:12px 0;font-size:.92em;line-height:1.9;}
.task-box{background:#f8fafc;border:1.5px solid var(--border);padding:18px 20px;border-radius:10px;margin:12px 0;font-size:.92em;line-height:2.8;}
.example-intro{background:var(--warn-light);border:1.5px solid var(--warn);padding:12px 16px;border-radius:10px;margin:10px 0;font-size:.9em;line-height:1.9;}
.hint-text{font-size:.8em;color:var(--accent);font-weight:700;}
.ruby-text{font-size:.72em;color:var(--primary);font-weight:700;margin-left:4px;vertical-align:super;}
.q-item{border-bottom:1px dashed var(--border);padding:16px 0;font-size:.95em;line-height:2.5;}
.jp-text{display:block;color:var(--text-sub);font-size:.88em;margin-bottom:4px;}
.fixed-mark{font-weight:700;font-size:1.2em;margin-left:2px;vertical-align:middle;color:var(--text-sub);}
.line-break{display:block;height:8px;}
.section h3{font-size:.95em;font-weight:700;color:var(--primary);margin:14px 0 8px;border-bottom:2px solid var(--primary-light);padding-bottom:4px;}
table tr[style*="color:red"]{color:var(--accent)!important;font-weight:700;}
table tr[style*="background:#ffff00"]{background:var(--warn-light)!important;font-weight:700;}

</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">EA09</div>
  <h1>⚡ 爆速英文法：名詞の複数形</h1>
</div>
<nav class="step-nav">
  <button class="step-btn" id="btn-info"  onclick="changeStep('info')">1.説明</button>
  <button class="step-btn" id="btn-ex"    onclick="changeStep('ex')">2.例題</button>
  <button class="step-btn" id="btn-prac"  onclick="changeStep('prac')">3.類題</button>
  <button class="step-btn" id="btn-test"  onclick="changeStep('test')">4.テスト</button>
</nav>
<div class="g-container">
  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <button id="start-btn" class="btn-start" onclick="startChallenge()">▶ チャレンジ開始！</button>
  </div>
  <div id="display-area"></div>
  <div class="record-section">
    <div class="record-title">⏱ タイムレコード</div>
    <ul class="record-list">
      <li><span>1回目</span><span class="record-time" id="rec-0">--:--</span></li>
      <li><span>2回目</span><span class="record-time" id="rec-1">--:--</span></li>
      <li><span>3回目</span><span class="record-time" id="rec-2">--:--</span></li>
      <li><span>4回目</span><span class="record-time" id="rec-3">--:--</span></li>
      <li><span>5回目</span><span class="record-time" id="rec-4">--:--</span></li>
    </ul>
    <button class="btn-reset" onclick="resetRecords()">記録をリセット</button>
  </div>
  <div class="vocab-section">
    <div class="vocab-title">📗 マイ単語帳</div>
    <ul id="my-vocab" class="word-list"></ul>
    <button class="btn-vocab-test" onclick="startVocabTest()">📝 単語テストをする</button>
  </div>
  <div id="vocab-test-area" style="display:none;"></div>
  <div class="nav-btns">
    <a href="index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="EA10.html" class="btn-nav btn-next">EA10へ →</a>
  </div>
</div>
<div id="pool-fixed" class="fixed-pool"><div id="word-pool"></div></div>
<script>
const DICT = {
    "cups": "【カ】ップス (名)コップ（複数）",
    "books": "ブッ【ク】ス (名)本（複数）",
    "dogs": "ドッ【グ】ズ (名)犬（複数）",
    "boxes": "ボッ【ク】スィズ (名)箱（複数）",
    "dishes": "【ディ】ッシィズ (名)皿（複数）",
    "cities": "スィ【ティ】ーズ (名)都市（複数）",
    "many": "【メ】ニ (形)たくさんの",
    "countries": "【カ】ントリーズ (名)国（複数）",
    "classes": "ク【ラ】スィズ (名)授業（複数）",
    "watches": "【ウォ】ッチィズ (名)腕時計（複数）",
    "babies": "【ベ】イビーズ (名)赤ちゃん（複数）",
    "dictionaries": "ディクショ【ナ】リーズ (名)辞書（複数）"
};

const MASTER_DATA = {
    ex: [
        { jp: "私は2冊の本を持っています。", en: ["I", "have", "two", "books"], type: "a" },
        { jp: "あなたはたくさんのペンを持っていますか？", en: ["Do", "you", "have", "many", "pens"], type: "q" },
        { jp: "私たちはリンゴが好きです。", en: ["We", "like", "apples"], type: "a" }
    ],
    prac: [
        { jp: "あなたは2匹の犬を飼っています。", en: ["You", "have", "two", "dogs"], type: "a" },
        { jp: "彼らはたくさんの箱を持っています。", en: ["They", "have", "many", "boxes"], type: "a" },
        { jp: "私たちは都市（複数）が好きです。", en: ["We", "like", "cities"], type: "a" }
    ],
    test: [
        { jp: "私はたくさんの本が好きです。", en: ["I", "like", "many", "books"], type: "a" },
        { jp: "あなたは2つの箱を持っていますか？", en: ["Do", "you", "have", "two", "boxes"], type: "q" },
        { jp: "彼らは皿（複数）を持っていますか？", en: ["Do", "they", "have", "dishes"], type: "q" },
        { jp: "私たちは辞書（複数）を持っていません。", en: ["We", "don't", "have", "dictionaries"], type: "a" }
    ]
};

let currentMode = 'info', isChallenging = false, selectedWord = null, selectedId = null, startTime, timerInterval;
let records = [null, null, null, null, null];
let completedSteps = { info: false, ex: false, prac: false, test: false };

function init() { changeStep('info'); }

function wrapWord(word) {
    const pureWord = word.replace(',', '').replace('.', '').replace('?', '').toLowerCase();
    if (DICT[pureWord]) {
        return `<span class="imp-word">${word}<span class="tooltip">${DICT[pureWord]}<br><button class="add-btn" onclick="event.stopPropagation(); addToVocab('${pureWord}')">単語帳に追加</button></span></span>`;
    }
    return word;
}

function speak(text) {
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'en-US'; uttr.rate = 0.8;
    speechSynthesis.speak(uttr);
}

function addToVocab(word) {
    const list = document.getElementById("my-vocab");
    if (list.innerHTML.includes(word)) return;
    const li = document.createElement("li");
    li.innerHTML = `<strong>${word}</strong><br><small>${DICT[word]}</small>`;
    list.appendChild(li);
}

function changeStep(mode) {
    currentMode = mode;
    isChallenging = false;
    clearInterval(timerInterval);
    document.getElementById("timer").textContent = "00:00";
    document.getElementById("pool-fixed").style.display = "none";
    document.getElementById("start-btn").style.display = "block";
    document.querySelectorAll(".step-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById("btn-" + mode).classList.add("active");
    render();
}

function render() {
    const area = document.getElementById("display-area");
    if(currentMode === 'info') {
        area.innerHTML = `
            <div class="section">
                <h2>1. 名詞の複数形のつくり方</h2>
                <table>
                    <tr>
                        <th style="width:30%">ルール</th>
                        <th style="width:35%">単数形</th>
                        <th style="width:35%">複数形</th>
                    </tr>
                    <tr>
                        <td>直接 s をつける</td>
                        <td><span class="ruby">ブック</span>book</td>
                        <td><span class="ruby ruby-text">ブックス</span><span class="blank" data-ans="books" onclick="handleTargetClick(this)">books</span></td>
                    </tr>
                    <tr>
                        <td>s, x, ch, sh で終わるなら es</td>
                        <td><span class="ruby">ボックス</span>box</td>
                        <td><span class="ruby ruby-text">ボックスィズ</span><span class="blank" data-ans="boxes" onclick="handleTargetClick(this)">boxes</span></td>
                    </tr>
                    <tr>
                        <td>子音＋y で終わるなら<br>yをiに変えて es</td>
                        <td><span class="ruby">ディクショナリ</span>dictionary</td>
                        <td><span class="ruby ruby-text">ディクショナリーズ</span><span class="blank" data-ans="dictionaries" onclick="handleTargetClick(this)">dictionaries</span></td>
                    </tr>
                </table>
            </div>

            <div class="section">
                <h2>次の単語を複数形にしなさい。</h2>
                <table class="task-table">
                    <tr><th>単数形</th><th>複数形</th></tr>
                    <tr><td class="task-label">cup (コップ)</td><td><span class="ruby ruby-text">カップス</span><span class="blank" data-ans="cups" onclick="handleTargetClick(this)">cups</span></td></tr>
                    <tr><td class="task-label">book (本)</td><td><span class="ruby ruby-text">ブックス</span><span class="blank" data-ans="books" onclick="handleTargetClick(this)">books</span></td></tr>
                    <tr><td class="task-label">country (カントリー　国)</td><td><span class="ruby ruby-text">カントリーズ</span><span class="blank" data-ans="countries" onclick="handleTargetClick(this)">countries</span></td></tr>
                    <tr><td class="task-label">dish (ディッシュ　皿)</td><td><span class="ruby ruby-text">ディシィーズ</span><span class="blank" data-ans="dishes" onclick="handleTargetClick(this)">dishes</span></td></tr>
                    <tr><td class="task-label">box (ボックス　箱)</td><td><span class="ruby ruby-text">ボクシィーズ</span><span class="blank" data-ans="boxes" onclick="handleTargetClick(this)">boxes</span></td></tr>
                    <tr><td class="task-label">class (クラス　授業)</td><td><span class="ruby ruby-text">クラスィズ</span><span class="blank" data-ans="classes" onclick="handleTargetClick(this)">classes</span></td></tr>
                    <tr><td class="task-label">watch (ウォッチ　腕時計)</td><td><span class="ruby ruby-text">ウォッチィズ</span><span class="blank" data-ans="watches" onclick="handleTargetClick(this)">watches</span></td></tr>
                    <tr><td class="task-label">city (シティー　都市)</td><td><span class="ruby ruby-text">シティーズ</span><span class="blank" data-ans="cities" onclick="handleTargetClick(this)">cities</span></td></tr>
                    <tr><td class="task-label">baby (ベイビー　赤ちゃん)</td><td><span class="ruby ruby-text">ベイビーズ</span><span class="blank" data-ans="babies" onclick="handleTargetClick(this)">babies</span></td></tr>
                    <tr><td class="task-label">dictionary (ディクシャナリー　辞書)</td><td><span class="ruby ruby-text">ディクシャナリーズ</span><span class="blank" data-ans="dictionaries" onclick="handleTargetClick(this)">dictionaries</span></td></tr>
                </table>
            </div>

            <div class="section">
                <h2>2. 例文チェック</h2>
                <div class="check-box">
                    <span class="check-jp">私は2冊の本を持っています。<button class="voice-btn" onclick="speak('I have two books.')">🔊</button></span>
                    I have two <span class="blank" data-ans="books" onclick="handleTargetClick(this)">books</span>.
                </div>
                <div class="check-box">
                    <span class="check-jp">あなたはたくさんのペンを持っていますか？<button class="voice-btn" onclick="speak('Do you have many pens?')">🔊</button></span>
                    Do you have ${wrapWord("many")} <span class="blank" data-ans="pens" onclick="handleTargetClick(this)">pens</span>?
                </div>
            </div>`;
        if(!isChallenging) { 
            document.querySelectorAll(".blank").forEach(el => el.textContent = el.dataset.ans); 
        }
    } else {
        let modeTitle = currentMode==='ex'?'例題':currentMode==='prac'?'類題':'テスト';
        let html = '<div class="section"><h2>' + modeTitle + 'チャレンジ</h2>';
        MASTER_DATA[currentMode].forEach(function(q) {
            var mark = (q.type === 'q') ? '?' : '.';
            var sentence = q.en.join(' ');
            html += '<div style="margin-bottom:16px;padding:14px;background:#f8faff;border:1.5px solid var(--border);border-radius:10px;">';
            html += '<p style="font-weight:bold;margin-bottom:10px;">' + q.jp + '<button class="voice-btn" onclick="speak(\'' + sentence + mark + '\')">&#128266;</button></p>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">';
            q.en.forEach(function(w) {
                var disp = isChallenging ? '' : wrapWord(w);
                html += '<span class="square" data-ans="' + w + '" onclick="handleTargetClick(this)">' + disp + '</span>';
            });
            html += '<span style="font-size:1.3em;font-weight:700;color:var(--text-sub);">' + mark + '</span>';
            html += '</div></div>';
        });
        area.innerHTML = html + '</div>';
    }

}


function startChallenge() {
    isChallenging = true;
    render();
    if(currentMode === 'info') {
        document.querySelectorAll(".blank").forEach(el => { el.textContent = ""; el.classList.add("is-active"); });
        document.querySelectorAll(".ruby-text").forEach(el => el.classList.add("hidden-ruby"));
    }
    document.getElementById("pool-fixed").style.display = "block";
    document.getElementById("start-btn").style.display = "none";
    renderPool();
    startTime = Date.now();
    timerInterval = setInterval(() => {
        const d = Math.floor((Date.now()-startTime)/1000);
        document.getElementById("timer").textContent = String(Math.floor(d/60)).padStart(2,'0')+":"+String(d%60).padStart(2,'0');
    }, 100);
}

function renderPool() {
    const pool = document.getElementById("word-pool");
    pool.innerHTML = "";
    let words = [];
    if(currentMode === 'info') {
        // 表3つ + たしかめ10こ + 例文2つ = 15個
        words = ["books","boxes","dictionaries","cups","books","countries","dishes","boxes","classes","watches","cities","babies","dictionaries","books","pens"];
    } else {
        MASTER_DATA[currentMode].forEach(q => words = words.concat(q.en));
    }
    words.sort(() => Math.random() - 0.5).forEach((w, i) => {
        const card = document.createElement("div");
        card.className = "word-card"; card.id = "c-" + i;
        card.innerHTML = wrapWord(w);
        card.addEventListener('click', function(e) {
            if(e.target.tagName === 'BUTTON') return;
            selectedWord = w; selectedId = card.id;
            document.querySelectorAll(".word-card").forEach(c => c.classList.remove("selected"));
            card.classList.add("selected");
        });
        pool.appendChild(card);
    });
}

function handleTargetClick(el) {
    if (!isChallenging || !selectedWord || el.textContent !== "") return;
    if (selectedWord === el.dataset.ans) {
        el.textContent = selectedWord;
        el.classList.remove("is-active");
        const ruby = el.parentElement.querySelector(".ruby-text");
        if(ruby) ruby.classList.remove("hidden-ruby");
        
        document.getElementById(selectedId).classList.add("hidden");
        selectedWord = null;
        if([...document.querySelectorAll(".blank, .square")].every(s => s.textContent !== "")) finishStep();
    } else { alert("画像通りのスペルで答えてね！"); }
}

function finishStep() {
    clearInterval(timerInterval);
    const finalTime = document.getElementById("timer").textContent;
    alert("合格！おめでとう！");
    completedSteps[currentMode] = true;
    document.getElementById("btn-" + currentMode).classList.add("completed");
    if (currentMode !== 'info') {
        for(let i=0; i<5; i++) {
            if(records[i] === null) {
                records[i] = finalTime;
                document.getElementById("rec-" + i).textContent = finalTime;
                break;
            }
        }
    }
    isChallenging = false;
    document.getElementById("start-btn").style.display = "block";
}

// -- 単語帳テスト（1問ずつ） --
var _vq = [], _vIdx = 0, _vCorrect = 0;

function startVocabTest() {
  var vocabItems = document.getElementById('my-vocab').children;
  if (vocabItems.length === 0) {
    alert('単語帳にまだ単語がありません。\n緑の単語をタップして単語帳に追加してください！');
    return;
  }
  _vq = [];
  [].forEach.call(vocabItems, function(li) {
    var strong = li.querySelector('strong');
    var small  = li.querySelector('small');
    if (strong && small) {
      var mean = small.textContent.trim();
      // 先頭のカタカナ・記号部分を除去
      var cleanMean = mean.replace(/^\S+\s+/, '').replace(/^\([^)]+\)\s*/, '').trim();
      if (!cleanMean || cleanMean.length < 2) cleanMean = mean;
      _vq.push({ word: strong.textContent.trim(), mean: cleanMean });
    }
  });
  _vq.sort(function(){ return Math.random() - 0.5; });
  _vIdx = 0; _vCorrect = 0;
  document.getElementById('vocab-test-area').style.display = 'block';
  document.getElementById('vocab-test-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  renderVocabQ();
}

function renderVocabQ() {
  var area = document.getElementById('vocab-test-area');
  if (_vIdx >= _vq.length) {
    var msg = _vCorrect === _vq.length ? '🎉 全問正解！完璧です！'
            : _vCorrect >= Math.ceil(_vq.length * 0.75) ? '👍 あと少し！もう一度！'
            : '📖 復習してもう一度挑戦！';
    var col = _vCorrect === _vq.length ? 'var(--success)' : 'var(--accent)';
    area.innerHTML = '<div class="vocab-test-card"><div class="vocab-score" style="color:' + col + ';">'
      + msg + '<br><span style="font-size:1.6em;">' + _vCorrect + ' / ' + _vq.length + '</span> 正解'
      + '</div><div style="text-align:center;">'
      + '<button class="btn-vocab-retry" onclick="retryVocabTest()">🔁 もう一度</button>'
      + ' <button class="btn-vocab-retry" style="background:var(--text-sub);" onclick="closeVocabTest()">閉じる</button>'
      + '</div></div>';
    return;
  }

  var q = _vq[_vIdx];
  var progress = (_vIdx + 1) + ' / ' + _vq.length;

  // 不正解の選択肢をDICTから補充
  var allMeans = Object.keys(DICT).map(function(w) {
    var m = DICT[w].replace(/^\S+\s+/, '').replace(/^\([^)]+\)\s*/, '').trim();
    return m || DICT[w];
  }).filter(function(m, idx, arr) {
    return m && m !== q.mean && arr.indexOf(m) === idx;
  });
  allMeans.sort(function(){ return Math.random() - 0.5; });
  var choices = [q.mean].concat(allMeans.slice(0, 3));
  choices.sort(function(){ return Math.random() - 0.5; });

  var btnsHtml = choices.map(function(ch) {
    var ec = ch.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var em = q.mean.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<button class="vocab-choice" onclick="checkVocabAnswer(this,\'' + ec + '\',\'' + em + '\')">' + ch + '</button>';
  }).join('');

  area.innerHTML = '<div class="vocab-test-card">'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:10px;">'
    + '<span style="font-size:.82em;color:var(--text-sub);font-weight:700;">📝 単語テスト</span>'
    + '<span style="font-size:.82em;font-weight:700;color:var(--primary);">' + progress + '</span>'
    + '</div>'
    + '<div style="background:var(--primary-light);border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;">'
    + '<div class="vocab-q">' + q.word + '</div>'
    + '<button onclick="speak(\'' + q.word + '\')" style="background:var(--orange);color:#fff;border:none;padding:5px 16px;border-radius:50px;font-size:.8em;cursor:pointer;">🔊 発音を聞く</button>'
    + '</div>'
    + '<div class="vocab-choices">' + btnsHtml + '</div>'
    + '</div>';
}

function checkVocabAnswer(btn, chosen, correct) {
  var allBtns = btn.closest('.vocab-test-card').querySelectorAll('.vocab-choice');
  [].forEach.call(allBtns, function(b) {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen === correct) { btn.classList.add('correct'); _vCorrect++; }
  else { btn.classList.add('wrong'); }
  setTimeout(function() { _vIdx++; renderVocabQ(); }, chosen === correct ? 600 : 1400);
}

function retryVocabTest() {
  _vIdx = 0; _vCorrect = 0;
  _vq.sort(function(){ return Math.random() - 0.5; });
  renderVocabQ();
}

function closeVocabTest() {
  document.getElementById('vocab-test-area').style.display = 'none';
}

</script>
